<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commit Shame · a verdict on your git history</title>
        <meta
            name="description"
            content="Drop a GitHub repo. Get a printed receipt of its most embarrassing commits. No signup. Shareable."
        />
        <link rel="canonical" href="https://commitsha.me/" />
        <meta property="og:title" content="Commit Shame" />
        <meta
            property="og:description"
            content="A verdict on your git history. Drop a repo. Get a receipt."
        />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://commitsha.me/" />
        <meta property="og:site_name" content="Commit Shame" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Commit Shame" />
        <meta
            name="twitter:description"
            content="A verdict on your git history. Drop a repo. Get a receipt."
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧾</text></svg>"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Special+Elite&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <div class="topbar">
            <div class="brand"><span class="red-dot">●</span> COMMIT SHAME</div>
            <div class="topbar-meta" id="quota-meta">
                no signup · pooled api
            </div>
        </div>

        <section class="hero">
            <h1>Commit<span class="amp">·</span>Shame</h1>
            <div class="sub">a verdict on your git history</div>
        </section>

        <div class="input-wrap">
            <form class="input-row" id="judge-form" autocomplete="off">
                <div class="prompt">&gt;</div>
                <input
                    class="repo-input"
                    id="repo-input"
                    type="text"
                    placeholder="owner/repo or full GitHub URL"
                    spellcheck="false"
                    autocapitalize="off"
                    autocorrect="off"
                />
                <button type="submit" class="judge-btn" id="shame-btn">
                    Judge
                </button>
            </form>

            <div class="examples">
                <span class="examples-label">try:</span>
                <button class="chip" data-repo="torvalds/linux">
                    torvalds/linux
                </button>
                <button class="chip" data-repo="microsoft/vscode">
                    microsoft/vscode
                </button>
                <button class="chip" data-repo="facebook/react">
                    facebook/react
                </button>
                <button class="chip" data-repo="vercel/next.js">
                    vercel/next.js
                </button>
                <button class="chip" data-repo="rails/rails">
                    rails/rails
                </button>
            </div>

            <div class="recent-row" id="recent-row" style="display: none">
                <span class="examples-label">recent:</span>
                <span id="recent-chips"></span>
            </div>

            <div class="opts-row">
                <span
                    >branch:
                    <input
                        type="text"
                        class="branch-input"
                        id="branch-input"
                        placeholder="default"
                /></span>
                <span style="margin-left: auto"
                    >press <kbd>⌘</kbd> <kbd>K</kbd> to focus</span
                >
            </div>

            <div id="error-msg" role="alert"></div>
        </div>

        <div id="loading" aria-live="polite">
            <div class="typewriter" id="typewriter"></div>
        </div>

        <div id="results"></div>

        <footer class="page-foot">
            <div class="page-foot-line">
                no signup · no tracking · pooled api
            </div>
            <div class="page-foot-actions">
                <a
                    class="oss-badge"
                    href="https://github.com/devgav-o/commitshame"
                    target="_blank"
                    rel="noopener"
                    aria-label="Open source on GitHub"
                >
                    <svg
                        viewBox="0 0 16 16"
                        width="13"
                        height="13"
                        aria-hidden="true"
                        fill="currentColor"
                    >
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                        />
                    </svg>
                    <span>open source · MIT</span>
                </a>
                <a
                    class="contribute-btn"
                    href="https://github.com/devgav-o/commitshame"
                    target="_blank"
                    rel="noopener"
                >
                    <svg
                        viewBox="0 0 16 16"
                        width="13"
                        height="13"
                        aria-hidden="true"
                        fill="currentColor"
                    >
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                        />
                    </svg>
                    <span>contribute</span>
                </a>
            </div>
        </footer>

        <div id="toast" role="status"></div>

        <script type="module" src="/app.js"></script>
    </body>
</html>
